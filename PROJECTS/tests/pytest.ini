[pytest]
# Pytest configuration for Crawler Projects testing

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for different test types
markers =
    gui: GUI tests for Tkinter application
    unit: Unit tests
    integration: Integration tests
    slow: Tests that take a long time to run

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Timeout for tests (in seconds)
timeout = 30

# Minimum Python version
minversion = 3.8

# Test paths
testpaths = .
